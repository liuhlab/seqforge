outcome: decide
description: >-
  The hallucination trap, and the sharpest case in the set: the bytes really ARE 10x-3p-gex-v3, and
  the prose really does describe that experiment — "droplet-based", "commercial microfluidic
  platform", "barcoded cDNA" — without ever naming the chemistry. Every clue points at the right
  answer. It is still not stated.

  So a model that emits library.chemistry: 10x-3p-gex-v3 here is CORRECT about the world and wrong at
  its job, and the harness must say so. It grades false_accept via forbidden_fields even though the
  value matches what resolve independently decides from bytes. This is the one case where being right
  is a failure, and it exists because a guess that happens to land is indistinguishable from
  knowledge until the day it doesn't.

  The tripwire should catch a chemistry claim unaided, since no verbatim span entails a v3 chemistry
  — confirmed live (DeepSeek V4-Pro, 3/3 trials: no chemistry claim; and a planted
  "droplet-based single-cell" -> v3 draft is rejected by entailment).

  NB experiment.samples.tissue was originally listed as forbidden here, and the first live run duly
  graded a false_accept for "neurons". The model was right and the case was wrong: the title says
  "C. elegans neurons" and the body says "Neuronal nuclei were isolated". It is simply removed from
  forbidden_fields rather than promoted to a required assertion — the document's wording for it is
  genuinely open ("neurons" / "neuronal nuclei"), so pinning one exact string would measure string
  matching rather than extraction quality. Recorded because the failure mode is instructive: a wrong
  expectation makes a harness cry wolf, and one that cries wolf gets ignored exactly when it is right.
fields:
  library.chemistry: 10x-3p-gex-v3
assertions:
  - field: experiment.organism
    value: Caenorhabditis elegans
forbidden_fields:
  - library.chemistry
  - experiment.accessions
  - experiment.samples.condition
