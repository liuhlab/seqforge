outcome: decide
description: >-
  Family-level authority (RESOLVE 2026.7.8, the GSE229022 lesson): observed bytes (28 bp -> v3)
  differ from asserted metadata (v2), but v2 and v3 are two leaves of the SAME family (10x-3p-gex).

  A paper names the assay family reliably and the exact leaf (v2 vs v3) vaguely — often it describes a
  study that included v2 while only the higher-quality v3 was deposited. So a within-family difference
  is NOT a block: the bytes decide the leaf (v3), and the case decides at exit 0. This case originally
  expected `ask` under the old "any v2-vs-v3 disagreement is a conflict" policy; the policy changed.

  What is NOT lost: the discarded v2 claim is not silently dropped. It is recorded as a RESOLVED
  conflict (status=resolved, decided_by=code, chosen_value 28) inside the ResolveResult — auditable,
  "three truths, never merged" — but not open, so it neither blocks nor grades (the grader inspects
  only open conflicts). A CROSS-family disagreement (say, single-cell asserted but bulk bytes) still
  surfaces an open conflict and asks; that honesty is unchanged.
fields:
  library.chemistry: 10x-3p-gex-v3
