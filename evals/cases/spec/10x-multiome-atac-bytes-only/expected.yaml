outcome: decide
description: >-
  10x Multiome (ARC) scATAC arm from bytes alone. A 3-read layout — two genomic mates (Tn5 fragment
  ends) plus a cell-barcode read with NO UMI — is structurally distinct from every 2-read scRNA
  chemistry (read count 3 vs 2), and this case proves it resolves to a positive target rather than
  abstaining. The barcode read carries an 8 bp constant lead-in before the 16 bp ARC barcode, so the
  barcode is located by a widened byte scan (`offset_scan`) at whatever offset it sits, in either
  orientation — the same spec resolves a clean 16 bp-at-0 deposit and this prefixed one, and the
  manifest, not the spec, carries the offset the composer renders into chromap's `--read-format`.
  Before this spec existed the ATAC arm hit UNSUPPORTED_TECHNOLOGY; it now classifies to
  `10x-multiome-atac` and, through it, to the SECOND aligner (`map/chromap`) — the first non-STARsolo
  pipeline reached from bytes. The role assertions pin the barcode read the resolver settled on, from
  structure, with no filename semantics.
fields:
  library.chemistry: 10x-multiome-atac
  library.roles.R2: R2
