outcome: decide
description: >-
  PRE-REGISTRATION — the pilot's single real acceptance case (design §8). Written on the maintainer's
  go, from PUBLICLY DECLARED METADATA ONLY, and committed BEFORE any run. No byte of this dataset has
  been read, sampled, listed, stat'd, or profiled, and none may be until the maintainer says so. Every
  value below is traceable to a public record, cited inline. If a run later disagrees with this file,
  the finding is real — that is the entire point of writing it first. Do not edit this file to match a
  result; a pre-registration that gets adjusted after seeing the data is just a post-hoc note.

  DECLARED FACTS (BioProject PRJNA1027859 = SRA study SRP502277; ENA + NCBI agree independently):
    - organism      : Caenorhabditis elegans, taxid 6239  -> assembly ce11
    - library_source: "TRANSCRIPTOMIC SINGLE CELL" (a structured single-cell signal, independent of
                      the protocol free-text); strategy RNA-Seq; selection cDNA; layout PAIRED
    - instrument    : Illumina NovaSeq 6000
    - protocol      : "Single nuclei suspension samples were loaded to the 10X Genomics Chromium X
                      system using the Single Cell 3 v3.1 Reagent Kits ... sequenced on Illumina
                      NovaSeq 6000 S Prime flowcells as 28+94 nt pair-end reads" (verbatim)
    - runs          : 6 x SRR28716553..SRR28716558; ~3.05e9 spots, ~372 Gbases total
    - samples       : 6 BioSamples; 3 WT (strain CQ757) + 3 daf-2 (CQ758); tissue=Neurons;
                      dev_stage=Adult Day 1; sex=hermaphrodite
    - paper         : Cell Genomics 2024, PMID 39637862, DOI 10.1016/j.xgen.2024.100720
  NB the paper's data-availability statement says the data are in GEO. There is NO GEO series — three
  independent checks return nothing. It is BioProject/SRA only. Recorded so nobody hunts for a GSE.

  THE EXPECTATION, and why each part is defensible from metadata alone:

  * outcome: decide. 28+94 nt is declared in the submitter's own free text. A 28 bp barcode read is
    16 bp CB + 12 bp UMI = the v3 geometry, which is what the KB's length gate keys on.

  * library.chemistry: 10x-3p-gex-v3, with 10x-3p-gex-v3.1 in the equivalence class and ZERO
    questions. The record declares "v3.1"; the KB declares v3 <-> v3.1 as `processing_equivalent`
    (identical 16+12 geometry, identical 3M-february-2018 whitelist, byte-identical STARsolo params).
    That is the §12 benign rule exactly: backend_identical => processing_equivalent => record both,
    ask nothing. A `Conflict` here would be a false_refuse, not diligence: the two ids name the same
    pipeline, and the manifest is not entitled to a question a human cannot answer from the bytes.

  PRECONDITION (a real one, stated up front rather than discovered mid-run): reaching this expectation
  needs the 3M-february-2018 whitelist available for the rung-3 onlist check. v3 is separable from
  10x-multiome-gex and 10x-gemx-3p-v4 ONLY by whitelist — all three share the 28 bp / 16+12 geometry.
  Without it the correct answer is a processing-divergent tie -> exit 4 (human queue), per the locked
  decision, and that too would be right rather than a failure. Run `seqforge io onlist fetch` first.

  DELIBERATELY NOT ASSERTED:

  * library.roles by filename. The record does NOT declare which file is the 28 nt read and which is
    the 94 nt read — the originals are named `-read-1` / `-read-4` (a bcl2fastq 4-read run with only
    reads 1 and 4 submitted), and ENA's `_1`/`_2` ordering plus file sizes only *suggest* the mapping.
    Inferring it from byte size would be exactly the guess this project exists to refuse. Nothing is
    lost: seqforge assigns roles from structure, never from filenames, so the run will settle it — and
    a wrong assignment still surfaces, as the composed --readFilesIn order is gated on the observed
    layout.
  * experiment.samples.condition / genotype. There is NO genotype attribute. WT-vs-daf-2 is declared
    only via strain ids (CQ757/CQ758), sample aliases, and filenames; the record never states what
    those strains are, nor a daf-2 allele. "Not declared" is the honest value.
  * Cell counts, CellRanger version, reference/annotation build: none are declared anywhere.

  KNOWN GAP THIS PRE-REGISTRATION SURFACED (and the reason to write it before running):
  this is single-NUCLEUS RNA-seq. Nuclei are full of unspliced pre-mRNA, so a large fraction of reads
  are INTRONIC, and STARsolo must count them with `--soloFeatures GeneFull`. The KB currently bakes
  `soloFeatures: [Gene]` (exon-only) into 10x-3p-gex-v3's `backend.params` — but 3' v3.1 chemistry is
  byte-identical for cells and nuclei, so soloFeatures is a property of SAMPLE PREP, not chemistry,
  and is misfiled. Compiling this case today would emit `Gene` and silently undercount: STARsolo exits
  0 and the matrix merely looks like a thin dataset — the same failure shape as a strand inversion.
  This expectation is unaffected (it asserts RESOLVE-level facts, which are correct either way), but
  the compose-level defect is real and tracked separately. Found from the metadata, before the run,
  without touching the data — which is what pre-registration is for.

  ---------------------------------------------------------------------------------------------------
  AMENDMENT 2026-07-15 — the gap above is CLOSED. Still no byte of this dataset has been read.

  The paragraph above is kept VERBATIM and is not to be tidied: it is the dated record that we found
  the defect from metadata, before the run. What changed is our code, not our reading of the record.

  Nothing in the sacred half of this file moved. `fields:` is byte-identical to the pre-registration
  commit — every claim about the DATASET (organism, the declared v3.1 chemistry, the §12 equivalence
  class, the outcome) is untouched, exactly as the paragraph above predicted it would be: it asserts
  RESOLVE-level facts, which are correct either way. This amendment edits only prose describing OUR
  COMPILER, which is a function of code version and is therefore allowed to change when the code does.
  The audit question is answerable from `git log` alone: every (a) claim byte-identical, and this (b)
  change cites a code diff rather than a result. It cites no run, because there has been none.

  What the code now does (R13/R14/R15, `predicts:` below pins the versions):
    - soloFeatures LEFT `backend.params`. The KB can no longer express a count key at all; the
      Backend validator rejects it. The parse/count line is checked, not conventional.
    - soloFeatures defaults to ALL FIVE (Gene GeneFull GeneFull_ExonOverIntron GeneFull_Ex50pAS
      Velocyto). So GeneFull is counted on this case WITHOUT anyone asserting a nuclei-vs-cells fact,
      and without a question. The gap is dissolved rather than answered.
    - The remedy the CHANGELOG proposed at the time — an unknown prep becoming a Question (exit 4) —
      was WITHDRAWN, not implemented. Note what that means for this case specifically: had it shipped,
      this pre-registration's `outcome: decide` would have FAILED, not because the science was wrong
      but because the proposal changed the contract the case was written against. Counting everything
      keeps `decide` correct and costs no question.

  Two things this amendment deliberately does NOT do, because either would be cheating:
    - it does not add a compose-level assertion. The harness grades a ResolveResult and never runs
      compose, and `Expected.fields` supports only library.*/rung — so "the compiler emits GeneFull"
      is not expressible here today. Making it gradeable means changing `Expected` AND the grader,
      which is legitimate but must land as its own commit, before the run, not bundled with a claim.
    - it does not touch `fields:`, `outcome:`, or any DECLARED FACT above.
  ---------------------------------------------------------------------------------------------------
  AMENDMENT 2026-07-15 (b) — the HELD-OUT DESIGNATION IS RETIRED. This case is the demo dataset.

  Maintainer decision: reserving this dataset was a misunderstanding of what it is for. It is the
  pilot's worked example — the dataset the tutorial is written from and the thing "it works end to
  end" means. The project now has no held-out case and does not want one. The PreToolUse guard and the
  SEQFORGE_CASE_* root registry that enforced the reservation are DELETED, not suspended: if a case
  should ever be reserved again, that machinery gets rebuilt deliberately rather than inherited.

  This changes NOTHING above and nothing below. Every word of this file was written from public
  metadata before any run, and that is still true — the retirement is not a result, so recording it is
  not editing a prediction to match one. The sacred half stays sacred for the reason it always was:
  a claim you can revise after seeing the answer is not a claim. `fields:`, `outcome:` and every
  DECLARED FACT remain byte-identical to the pre-registration commit; `git log` still answers the
  audit question on its own.

  What the retirement DOES change is that the earlier text's justification no longer applies as
  written. Two sentences above are now historical rather than operative:
    - "MUST NOT be read until the maintainer says so" — the maintainer has said so.
    - "no byte of this dataset has been read" — true when written, and true as of this amendment, but
      it is no longer a rule. The next run reads it, which is the point.
  They are kept verbatim rather than tidied, because they are the dated record of what we knew and
  when. Deleting them would be the dishonest move; so would leaving them to read as live rules.

  The one piece of the discipline that survives, and is not up for debate: pre-register before you
  run. That never depended on the data being reserved. It is what separates a prediction from a
  transcript, and only a prediction can be wrong.
  ---------------------------------------------------------------------------------------------------
  AMENDMENT 2026-07-16 — the sample facts move from PROSE into `fields:`. THE RUN HAS HAPPENED.

  Read that second sentence first, because it is the one that could make this amendment dishonest,
  and it is why this note is long. The dataset was run. The maintainer read the output. Every sample
  in it said `tissue: null`. So an edit to `fields:` now is happening AFTER the answer is known, and
  the rule at the bottom of this file says a claim you can revise after seeing the answer is not a
  claim. Here is the whole argument that this is a transcription and not a revision; check it rather
  than take it.

  1. The claims added below are not new. Every one is in the DECLARED FACTS block at the top of this
     file, verbatim, committed before any run:
       "samples : 6 BioSamples; 3 WT (strain CQ757) + 3 daf-2 (CQ758); tissue=Neurons;
                  dev_stage=Adult Day 1; sex=hermaphrodite"
       "organism : Caenorhabditis elegans, taxid 6239"
     They came from the public BioSample records then, and they come from the same records now. I did
     not learn them from the run.

  2. They can only make this case FAIL. We already know the run produced null for all of them. This
     edit moves the case from "silently untested" to "red", which is the exact opposite of the thing
     the rule prohibits. Tuning to the answer would mean writing `tissue: null` here; that is the edit
     that is forbidden, and it is the one that would have made the suite green.

  3. The mechanism landed first, as the 2026-07-15 amendment required. That amendment declined to add
     a compose-level assertion and said why: "Making it gradeable means changing `Expected` AND the
     grader, which is legitimate but must land as its own commit, before the run, not bundled with a
     claim." Same shape here, same discipline: `Expected.fields` and the grader learned to see
     samples in their own commit, with their own tests, before this file changed. `git log` shows the
     order.

  4. The reason it was prose in the first place is a defect, not a choice. The harness graded a
     `ResolveResult`, which has candidates and conflicts and NO SAMPLES, so there was no field on
     which to write "tissue=Neurons" and have anything read it. design.md §9 already named this
     gap ("the grader cannot express … SRX→sample mapping"). A pre-registration whose central claims
     live in a `description:` string is a pre-registration that cannot be wrong, and one that cannot
     be wrong is not one.

  Nothing in the (a) half is edited, reworded, or deleted. `library.chemistry` and
  `library.equivalence_members` are byte-identical to the pre-registration commit. The DELIBERATELY
  NOT ASSERTED block stands unchanged and still binds — in particular `condition / genotype`, which
  is now doubly right: the record declares no genotype attribute, and `condition` is no longer a
  field seqforge has. NCBI's vocabulary has no such attribute either, which is a small independent
  confirmation that the pre-registration was reading the record correctly and we were not.

  `records.json` is committed beside this file: the archive's own four levels, exactly as
  `seqforge io records PRJNA1027859` returns them. It is an INPUT, like `inputs/recipe.yaml`, not an
  expectation — and it is public metadata, so it carries no lab path.
  ---------------------------------------------------------------------------------------------------
predicts:
  # The code this expectation was written against. A (b) claim is only meaningful with one.
  seqforge: "2026.7.0"
  kb: "2026.7.1"
  workflow: "2026.7.1"
fields:
  library.chemistry: 10x-3p-gex-v3
  library.equivalence_members:
    - 10x-3p-gex-v3.1
  # ---- transcribed 2026-07-16 from the DECLARED FACTS block above. See the amendment. ----
  # `*` means "across every sample, sorted". These were never claims about one of the six: the
  # record declares them per BioSample and they happen to agree, and that agreement is the claim.
  experiment.organism: 6239
  experiment.samples.*.tissue: [Neurons, Neurons, Neurons, Neurons, Neurons, Neurons]
  # The ONLY structured field that separates this dataset's two conditions. 3 WT + 3 daf-2.
  experiment.samples.*.strain: [CQ757, CQ757, CQ757, CQ758, CQ758, CQ758]
  experiment.samples.*.sex:
    [hermaphrodite, hermaphrodite, hermaphrodite, hermaphrodite, hermaphrodite, hermaphrodite]
  experiment.samples.*.dev_stage:
    ["Adult Day 1", "Adult Day 1", "Adult Day 1", "Adult Day 1", "Adult Day 1", "Adult Day 1"]
  # A named sample, to pin the JOIN itself rather than only the multiset. If the six sets of facts
  # were attached to the wrong six samples, every `*` assertion above would still pass.
  experiment.samples.SAMN40935621.strain: CQ758
  experiment.samples.SAMN40935616.strain: CQ757
  experiment.study.title: >-
    A Single-Nucleus Atlas of Adult C. elegans Neurons Reveals GPCR and Insulin-signaling Profiles
  experiment.study.center: Princeton University
